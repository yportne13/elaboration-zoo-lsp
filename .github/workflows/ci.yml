name: Build and Deploy

on:
  push:
    branches:
      - master

jobs:
  dependencies:
    name: Build dependencies
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Set up Git repository
        uses: actions/checkout@v2
        with:
          fetch-depth: 1

      - name: Create global variables
        id: version
        run: echo "::set-output name=version::$(git rev-parse --short HEAD)"

  release:
    name: "Create Github tag/pre-release"
    runs-on: ubuntu-latest
    needs: dependencies
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Github pre-release (${{ needs.dependencies.outputs.version }})
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}-${{ needs.dependencies.outputs.version }}
          release_name: Version ${{ github.run_number }} (${{ needs.dependencies.outputs.version }})
          draft: false
          prerelease: false

  build-vscode:
    runs-on: ubuntu-latest
    needs: [dependencies, release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Build VS Code extension
        run: |
          cd vscode_extension/
          npm install
          npm install -g vsce
          vsce package

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: TyportHDL-1.0.0
          path: |
            vscode_extension/*.vsix
      - name: Upload vsix to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: vscode_extension/TyportHDL-1.0.0.vsix
          asset_name: TyportHDL-1.0.0.vsix
          asset_content_type: application/zip

  build-cli:
    name: Build CLI (Linux + Windows)
    runs-on: ubuntu-latest
    needs: [dependencies, release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-06-06
          targets: wasm32-wasip1-threads, x86_64-unknown-linux-musl, x86_64-pc-windows-gnu

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-mingw-w64-x86-64

      - name: Build typort (x86_64-unknown-linux-musl)
        run: |
          cargo build --release --target x86_64-unknown-linux-musl --bin typort
          cp target/x86_64-unknown-linux-musl/release/typort target/typort-x86_64-linux-musl

      - name: Build typort (x86_64-pc-windows-gnu)
        run: |
          cargo build --release --target x86_64-pc-windows-gnu --bin typort
          cp target/x86_64-pc-windows-gnu/release/typort.exe target/typort-x86_64-windows.exe

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: typort-cli
          path: |
            target/typort-x86_64-linux-musl
            target/typort-x86_64-windows.exe

      - name: Upload typort (Linux musl) to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: target/typort-x86_64-linux-musl
          asset_name: typort-x86_64-linux-musl
          asset_content_type: application/octet-stream

      - name: Upload typort (Windows) to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: target/typort-x86_64-windows.exe
          asset_name: typort-x86_64-windows.exe
          asset_content_type: application/octet-stream

  build-cli-macos:
    name: Build CLI (macOS ARM)
    runs-on: macos-latest
    needs: [dependencies, release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-06-06
          targets: aarch64-apple-darwin

      - name: Build typort (aarch64-apple-darwin)
        run: |
          cargo build --release --target aarch64-apple-darwin --bin typort
          cp target/aarch64-apple-darwin/release/typort target/typort-aarch64-macos

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: typort-cli-macos
          path: |
            target/typort-aarch64-macos

      - name: Upload typort (macOS ARM) to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: target/typort-aarch64-macos
          asset_name: typort-aarch64-macos
          asset_content_type: application/octet-stream